name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * *" # daily at 09:00 UTC
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Check for stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # --- Issues ---
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in the last 30 days. It will be closed in 7 days if no
            further activity occurs. If this issue is still relevant, please leave a
            comment or remove the `stale` label.
          close-issue-message: >
            This issue was closed because it has been stale for 7 days with no activity.
            Feel free to reopen if this is still relevant.
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,help wanted,good first issue"

          # --- Pull Requests ---
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            any activity in the last 14 days. It will be closed in 7 days if no
            further activity occurs. If this PR is still in progress, please push a
            commit or leave a comment.
          close-pr-message: >
            This pull request was closed because it has been stale for 7 days with no activity.
            Feel free to reopen if you'd like to continue working on this.
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: "stale"
          exempt-pr-labels: "pinned,security,dependencies"

          # --- General ---
          operations-per-run: 100
          ascending: true
          remove-stale-when-updated: true
