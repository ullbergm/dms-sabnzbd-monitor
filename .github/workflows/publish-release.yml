name: Publish Release

# Fires when a draft release is published via the GitHub UI.
# Replace the stub steps below with your actual release process,
# e.g. build artifacts, push a Docker image, publish to a registry.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish release ${{ github.event.release.tag_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
